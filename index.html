<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SV Adler Dellbrück U9</title>
<meta name="robots" content="noindex">
<!-- BEWUSST OHNE MANIFEST: Die Wurzel gehoert zu keiner App. Trainer- und Eltern-App
     leben in eigenen Ordnern und haben dadurch getrennte Scopes – nur so erkennt Chrome
     sie als zwei unabhaengige Apps. Diese Seite ist nur eine Weiche, damit alle bereits
     verschickten Links (?portal, ?heft, ?ticker, ?kind, ?quiz …) weiter funktionieren. -->
<script>
(function(){
  // Schleifensperre: Diese Weiche darf NIE unterhalb von /trainer/ oder /eltern/ laufen.
  // Ein veralteter Service Worker (cache-first mit ignoreSearch) kann sie dort faelschlich
  // ausliefern – dann wuerde sie sich endlos selbst aufrufen. In dem Fall raeumen wir den
  // alten Worker ab und laden genau einmal frisch nach.
  if(/\/(trainer|eltern)\//.test(location.pathname)){
    var schonProbiert=false;
    try{ schonProbiert=sessionStorage.getItem("adler_sw_reset")==="1"; }catch(e){}
    if(schonProbiert)return;
    try{ sessionStorage.setItem("adler_sw_reset","1"); }catch(e){}
    var aufraeumen=[];
    if("serviceWorker" in navigator)aufraeumen.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));}));
    if("caches" in window)aufraeumen.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));}));
    Promise.all(aufraeumen).catch(function(){}).then(function(){ location.reload(); });
    return;
  }
  var suche=location.search||"";
  var p=new URLSearchParams(suche);
  // Alles, was nicht die Trainer-Ansicht ist, laeuft im Eltern-Ordner.
  var elternRouten=["portal","quiz","heft","ticker","kind","delegate","match","eltern","rsvp","handover"];
  var ordner=elternRouten.some(function(k){return p.has(k);})?"eltern/":"trainer/";
  location.replace(ordner+suche+location.hash);
})();
</script>
</head>
<body style="font-family:system-ui;text-align:center;padding:48px;color:#334155">
  <div style="font-size:40px">🦅</div>
  <p>Einen Moment …</p>
  <p style="font-size:13px"><a href="trainer/">Trainer-App</a> · <a href="eltern/">Eltern-Bereich</a></p>
</body>
</html>
