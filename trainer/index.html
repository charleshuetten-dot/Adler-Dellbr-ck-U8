<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<!-- Alle Dateien liegen im Wurzelverzeichnis; nur die Einstiegsseiten stehen in
     eigenen Ordnern, damit Trainer- und Eltern-App getrennte Manifest-Scopes haben.
     Ohne getrennte Scopes haelt Chrome beide fuer dieselbe App ("bereits installiert"). -->
<base href="../">
<meta name="theme-color" content="#1a56db">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="U9 I Adler">
<meta name="application-name" content="U9 I Adler">
<link rel="manifest" id="pwa-manifest" href="manifest-trainer.json">
<link rel="apple-touch-icon" id="apple-icon" href="icon-trainer.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spielerprofil U9 I – SV Adler Dellbrück</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css">
<script>
// Nur-Lese-Ansichten bieten keine Installation an – sonst wuerde man von dort
// versehentlich die Trainer-App auf den Startbildschirm holen.
(function(){
  var p=new URLSearchParams(location.search);
  if(p.has("quiz")||p.has("heft")||p.has("ticker")||p.has("kind")||p.has("delegate")||p.has("match")){
    document.getElementById("pwa-manifest").remove();
  }
})();
</script>
</head>
<body>
<script>
/* Seitengeruest aus shell.html nachladen, dann die Skripte in genau der Reihenfolge
   wie frueher im <body>. Die Skripte haengen sich an DOMContentLoaded – das ist beim
   Nachladen laengst vorbei, deshalb loesen wir es am Ende einmal selbst aus. */
(async function(){
  const shell=await (await fetch("shell.html")).text();
  document.body.insertAdjacentHTML("afterbegin",shell);
  for(const datei of ["data.js","core.js","engine.js","views.js","quiz.js","matchday-eltern.js","matchday-planung.js","matchday-spiel.js","matchday-card.js","matchday-extras.js","boot.js"]){
    await new Promise((fertig,fehler)=>{
      const s=document.createElement("script");
      s.src=datei; s.onload=fertig; s.onerror=()=>fehler(new Error(datei));
      document.body.appendChild(s);
    });
  }
  if(document.readyState!=="loading")document.dispatchEvent(new Event("DOMContentLoaded"));
})().catch(e=>{
  console.error(e);
  document.body.innerHTML='<div style="font-family:system-ui;padding:32px;text-align:center;color:#334155">'
    +'<div style="font-size:40px">🦅</div><p>Die App konnte nicht geladen werden.<br>Bitte die Seite neu laden.</p></div>';
});
</script>
</body>
</html>
